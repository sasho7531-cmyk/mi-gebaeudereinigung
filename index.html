<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MI Gebäudereinigung | Premium Service</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --gold: #D4AF37; --black: #050505; --dark-grey: #121212; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--black); color: white; line-height: 1.6; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: rgba(0,0,0,0.9); position: fixed; width: 100%; z-index: 1000; border-bottom: 2px solid var(--gold); }
        .logo { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.5rem; font-weight: 900; }
        .hero { 
            height: 100vh; 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://pexels.com') center/cover no-repeat;
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
        .diamond { 
            width: 80px; height: 80px; background: var(--gold); margin-bottom: 20px;
            clip-path: polygon(50% 0%, 100% 35%, 80% 100%, 20% 100%, 0% 35%);
            animation: rotate 4s infinite linear; box-shadow: 0 0 30px var(--gold);
        }
        @keyframes rotate { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
        h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 3.5rem; margin-bottom: 10px; }
        .btn-wa { background: #25D366; color: white; padding: 15px 35px; text-decoration: none; border-radius: 50px; font-weight: bold; margin-top: 20px; display: inline-block; }
        .services { padding: 80px 5%; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--dark-grey); border: 1px solid var(--gold); border-radius: 15px; overflow: hidden; text-align: center; padding-bottom: 20px; }
        .card img { width: 100%; height: 200px; object-fit: cover; border-bottom: 2px solid var(--gold); background: #222; }
        .card h3 { color: var(--gold); margin: 15px 0; }
        .contact { padding: 60px 5%; background: var(--dark-grey); text-align: center; border-top: 2px solid var(--gold); }
        .gold-text { color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>
    <nav><div class="logo">MI GEBÄUDEREINIGUNG</div></nav>
    <header class="hero">
        <div class="diamond"></div>
        <h1>PREMIUM REINIGUNG</h1>
        <p>Meisterbetrieb in Neuwied</p>
        <a href="https://wa.me" class="btn-wa">WhatsApp Chat</a>
    </header>
    <section class="services">
        <div class="card">
            <img src="https://pexels.com" alt="Büro">
            <h3>Büroreinigung</h3>
        </div>
        <div class="card">
            <img src="https://pexels.com" alt="Glas">
            <h3>Glasreinigung</h3>
        </div>
        <div class="card">
            <img src="https://pexels.com" alt="Bau">
            <h3>Baureinigung</h3>
        </div>
    </section>
    <footer class="contact">
        <p>Inhaber: <span class="gold-text">Ismet Berisa</span> | Tel: <span class="gold-text">0176 63737254</span></p>
    </footer>
</body>
</html>
